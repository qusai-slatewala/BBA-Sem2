<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economics for Managers (EFM) - Study Module</title>
    <style>
        /* UPDATED TECHY COLOR SCHEME (No removals, just overriding variable values) */
        :root {
            --bg-color: #0b0f19; 
            --sidebar-bg: rgba(13, 20, 36, 0.85); 
            --sidebar-text: #e0e7ff;
            --primary: #00f0ff; 
            --secondary: #ff007f; 
            --accent: #00ff9d; 
            --text-main: #e2e8f0; 
            --card-bg: rgba(20, 30, 48, 0.85); 
            --border: #1e293b; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Custom sleek scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        /* NEW ANIMATION 12: bounceScale on scrollbar thumb */
        @keyframes bounceScale { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(1.5); } }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); animation: bounceScale 1s infinite; }

        /* Smooth Animated Gradient Background */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NEW ANIMATION 23: zoomBreathe */
        @keyframes zoomBreathe {
            0%, 100% { background-size: 400% 400%; }
            50% { background-size: 450% 450%; }
        }

        /* Techy Grid Background */
        @keyframes floatGrid {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        body {
            display: flex;
            flex-direction: column; 
            background: linear-gradient(-45deg, #0f172a, #020617, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite, zoomBreathe 30s infinite ease-in-out;
            color: var(--text-main);
            height: 100vh;
            /* ADDED FOR MOBILE SCROLL FIX */
            height: 100dvh; 
            overflow: hidden;
            position: relative;
        }

        /* Techy Overlay Grid applied to body::before */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: floatGrid 4s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        /* CREDITS BANNER */
        .credits-banner {
            width: 100%;
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary);
            text-align: center;
            padding: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            z-index: 100;
            text-transform: uppercase;
            animation: neonSpark 5s infinite;
        }

        .main-wrapper {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        /* NEW ANIMATION 13: matrixRain */
        @keyframes matrixRain {
            0% { background-position: 0% -100%; opacity: 0; }
            50% { opacity: 0.1; }
            100% { background-position: 0% 100%; opacity: 0; }
        }
        .matrix-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(180deg, transparent, rgba(0,255,157,0.2) 2px, transparent 4px);
            background-size: 100% 200%;
            animation: matrixRain 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* NEW ANIMATION 18: starTwinkle */
        @keyframes starTwinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.5); }
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: starTwinkle 3s infinite;
            z-index: 0;
        }

        /* NEW ANIMATION 14: laserScan */
        @keyframes laserScan {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 110%; opacity: 0; }
        }
        .laser-beam {
            position: absolute;
            width: 100%; height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
            animation: laserScan 8s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        /* Floating Background Blobs */
        /* Hue Shift on Blobs */
        @keyframes hueShiftBlob {
            0% { filter: blur(80px) hue-rotate(0deg); }
            50% { filter: blur(80px) hue-rotate(180deg); }
            100% { filter: blur(80px) hue-rotate(360deg); }
        }

        /* NEW ANIMATION 17: jellyMorph */
        @keyframes jellyMorph {
            0%, 100% { border-radius: 50%; }
            25% { border-radius: 60% 40% 70% 30%; }
            50% { border-radius: 30% 70% 40% 60%; }
            75% { border-radius: 50% 50% 20% 80%; }
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            z-index: 0;
            opacity: 0.3;
            animation: float 12s infinite ease-in-out alternate, hueShiftBlob 10s infinite linear, jellyMorph 8s infinite alternate;
        }
        .blob-1 { width: 350px; height: 350px; background: var(--secondary); top: -100px; left: 200px; }
        .blob-2 { width: 450px; height: 450px; background: var(--primary); bottom: -150px; right: -50px; animation-delay: -3s; }
        .blob-3 { width: 300px; height: 300px; background: var(--accent); top: 40%; left: 50%; transform: translate(-50%, -50%); animation-delay: -6s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.15); }
        }

        /* Sidebar - Enhanced with Glassmorphism and Entry Animation */
        @keyframes sidebarEntry {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(0,240,255,0.2); 
            color: var(--sidebar-text);
            overflow-y: auto;
            height: 100%;
            padding-bottom: 20px;
            flex-shrink: 0;
            box-shadow: 4px 0 20px rgba(0,240,255,0.1);
            z-index: 10;
            animation: sidebarEntry 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Wobble Sidebar Title */
        @keyframes wobbleSide {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .sidebar h2 {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.4);
            font-size: 1.2rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary);
            position: relative;
            transition: color 0.3s;
        }
        .sidebar h2:hover {
            animation: wobbleSide 0.5s ease-in-out;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        /* Exam Mode Badge */
        /* Neon Flicker */
        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--accent), 0 0 40px var(--accent); opacity: 1; box-shadow: 0 0 10px var(--accent); }
            20%, 24%, 55% { text-shadow: none; opacity: 0.5; box-shadow: none; }
        }
        /* NEW ANIMATION 16: swingDrop */
        @keyframes swingDrop {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(-10deg); }
            75% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }

        .exam-badge {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--accent);
            color: white;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 12px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: neonFlicker 3s infinite;
            transform-origin: top center;
        }
        .exam-badge:hover {
            animation: swingDrop 1s ease;
        }

        .unit-title {
            padding: 15px 20px 5px;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--secondary);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255,0,127,0.5);
        }

        /* Active Pulse Animation */
        @keyframes navPulse {
            0% { border-left-width: 4px; box-shadow: inset 0 0 0 transparent; }
            50% { border-left-width: 8px; border-color: var(--accent); box-shadow: inset 15px 0 20px -10px rgba(0,255,157,0.5); }
            100% { border-left-width: 4px; box-shadow: inset 0 0 0 transparent; }
        }

        .nav-btn {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: var(--sidebar-text);
            text-align: left;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid transparent;
            position: relative; 
            overflow: hidden;
        }

        .nav-btn:hover {
            background-color: rgba(255,0,127,0.1);
            border-left: 4px solid var(--secondary);
            padding-left: 28px; 
            color: #fff;
            text-shadow: 0 0 5px var(--secondary);
        }

        .nav-btn.active {
            background-color: rgba(0,240,255,0.1);
            border-left: 4px solid var(--primary);
            animation: navPulse 2s infinite;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary);
        }

        /* Press Down Click Effect */
        @keyframes pressDown {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .nav-btn:active, .accordion:active, .quiz-btn:active, .arcade-btn:active, .relax-btn:active {
            animation: pressDown 0.2s ease;
        }

        /* Main Content */
        /* NEW ANIMATION 11: glowShift on main content */
        @keyframes glowShift {
            0% { box-shadow: inset 0 0 20px rgba(0,240,255,0.1); }
            50% { box-shadow: inset 0 0 40px rgba(255,0,127,0.1); }
            100% { box-shadow: inset 0 0 20px rgba(0,255,157,0.1); }
        }
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            z-index: 1;
            position: relative;
            animation: glowShift 10s infinite alternate;
        }

        /* Scroll Progress Bar */
        .progress-container {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            background-size: 200% 200%;
            width: 0%;
            border-radius: 0 3px 3px 0;
            transition: width 0.1s ease-out;
            animation: shine 3s linear infinite;
            box-shadow: 0 0 10px var(--primary);
        }

        .content-padding {
            padding: 40px;
        }

        .section-container {
            display: none;
            max-width: 900px;
            margin: 0 auto;
        }

        .section-container.active {
            display: block;
        }

        /* Staggered Bouncy Slide-up Animation */
        @keyframes slideUpBounce {
            0% { opacity: 0; transform: translateY(40px); filter: blur(5px); }
            60% { opacity: 1; transform: translateY(-8px); filter: blur(0); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .section-container.active > * {
            opacity: 0;
            animation: slideUpBounce 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .section-container.active > *:nth-child(1) { animation-delay: 0.05s; }
        .section-container.active > *:nth-child(2) { animation-delay: 0.15s; }
        .section-container.active > *:nth-child(3) { animation-delay: 0.25s; }
        .section-container.active > *:nth-child(4) { animation-delay: 0.35s; }
        .section-container.active > *:nth-child(5) { animation-delay: 0.45s; }
        .section-container.active > *:nth-child(6) { animation-delay: 0.55s; }
        .section-container.active > *:nth-child(7) { animation-delay: 0.65s; }
        .section-container.active > *:nth-child(8) { animation-delay: 0.75s; }
        .section-container.active > *:nth-child(9) { animation-delay: 0.85s; }
        .section-container.active > *:nth-child(10) { animation-delay: 0.95s; }
        .section-container.active > *:nth-child(n+11) { animation-delay: 1.05s; }

        /* Cascading List Items Animation */
        /* NEW ANIMATION 10: tiltIn */
        @keyframes tiltIn {
            from { opacity: 0; transform: translateX(30px) rotateY(-30deg) scale(0.9); color: var(--primary); }
            to { opacity: 1; transform: translateX(0) rotateY(0deg) scale(1); color: inherit; }
        }
        .section-container.active li {
            opacity: 0;
            animation: tiltIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .section-container.active li:nth-child(1) { animation-delay: 0.4s; }
        .section-container.active li:nth-child(2) { animation-delay: 0.5s; }
        .section-container.active li:nth-child(3) { animation-delay: 0.6s; }
        .section-container.active li:nth-child(4) { animation-delay: 0.7s; }
        .section-container.active li:nth-child(5) { animation-delay: 0.8s; }
        .section-container.active li:nth-child(n+6) { animation-delay: 0.9s; }

        /* Cyberpunk Glitch on H1 Hover */
        @keyframes cyberGlitch {
            0% { transform: translate(0); text-shadow: none; }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 var(--secondary), -2px 0 var(--primary); }
            40% { transform: translate(-2px, -2px); text-shadow: none; }
            60% { transform: translate(2px, 2px); text-shadow: -2px 0 var(--secondary), 2px 0 var(--primary); }
            80% { transform: translate(2px, -2px); text-shadow: none; }
            100% { transform: translate(0); text-shadow: none; }
        }

        h1 { 
            margin-bottom: 10px; 
            font-size: 2.8rem; 
            background: linear-gradient(to right, var(--primary) 20%, var(--secondary) 40%, var(--accent) 60%, var(--primary) 80%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 5s linear infinite;
            cursor: crosshair;
        }
        h1:hover {
            animation: cyberGlitch 0.3s infinite;
        }
        
        /* Techy Glow on H2/H3 */
        @keyframes techyGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(0,240,255,0.2); }
            50% { text-shadow: 0 0 15px rgba(0,240,255,0.8); }
        }
        
        /* NEW ANIMATION 20: neonSpark */
        @keyframes neonSpark {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; filter: brightness(1.5); }
            70% { opacity: 1; filter: brightness(2); text-shadow: 0 0 20px #fff; }
        }

        h2 { 
            color: var(--primary); 
            margin-top: 30px; margin-bottom: 15px; 
            border-bottom: 2px solid rgba(0,240,255,0.3); 
            padding-bottom: 5px; position: relative; 
            animation: techyGlow 3s infinite, neonSpark 5s infinite;
        }
        h2::after { content: ''; position: absolute; left: 0; bottom: -2px; height: 2px; width: 50px; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent); }
        h2:hover::after { width: 150px; }

        h3 { color: var(--secondary); margin-top: 20px; margin-bottom: 10px; animation: techyGlow 3s infinite alternate-reverse; }
        p { margin-bottom: 15px; line-height: 1.7; font-size: 1.05rem; }
        ul, ol { margin-bottom: 15px; padding-left: 20px; line-height: 1.7; font-size: 1.05rem; }
        li { margin-bottom: 10px; }

        /* Typewriter Effect for fun intro */
        @keyframes typeWriter {
            from { width: 0; }
            to { width: 100%; }
        }
        .typewriter-text {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--accent);
            width: 0;
            animation: typeWriter 2s steps(40, end) 1s forwards, neonFlicker 1s step-end infinite alternate;
            color: var(--accent);
            font-family: monospace;
            margin-bottom: 20px;
        }

        /* Spinning Laser Border for Highlight Box */
        @keyframes borderSpin {
            100% { transform: rotate(360deg); }
        }

        .highlight-box {
            background-color: rgba(0, 240, 255, 0.05);
            padding: 20px;
            margin: 25px 0;
            border-radius: 8px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(0,240,255,0.2);
        }
        .highlight-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--primary), transparent 30%);
            animation: borderSpin 4s linear infinite;
            z-index: -1;
        }
        .highlight-box::after {
            content: '';
            position: absolute;
            inset: 3px; 
            background: var(--card-bg);
            border-radius: 5px;
            z-index: -1;
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin: 25px 0;
        }

        /* NEW ANIMATION 9: floatUpShadow */
        @keyframes floatUpShadow {
            0% { box-shadow: 0 6px 12px rgba(0,0,0,0.5); transform: translateY(0); }
            100% { box-shadow: 0 25px 35px rgba(0,240,255,0.3); transform: transl
